name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''
          - platform: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            args: ''
          - platform: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
          - platform: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            args: ''

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Install dependencies (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          # Install Apple targets for universal binary
          rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Dolphin Gang Tour ${{ github.ref_name }}
          releaseBody: |
            ## Dolphin Gang Tour ${{ github.ref_name }}

            ### 下载说明
            - **Windows**: 下载 `.msi` 或 `.nsis.zip`（EXE安装包）
            - **macOS Intel**: 下载 `.dmg` (x64)
            - **macOS Apple Silicon**: 下载 `.dmg` (aarch64)
            - **Linux**: 下载 `.AppImage` 或 `.deb`
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
